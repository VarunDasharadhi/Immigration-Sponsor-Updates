# CI check on merge to main — build + type-check only.
# Firebase Hosting deploy removed; app is deployed to Vercel.

name: CI on merge

on:
  push:
    branches:
      - main

jobs:
  build_and_check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - run: npm run type-check
      - run: npm run build
